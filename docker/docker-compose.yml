version: "3.8"

services:
  sao:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3100:3100"
    environment:
      - SAO_BIND_ADDR=0.0.0.0:3100
      - SAO_DATA_DIR=/data/sao
      - RUST_LOG=info
      # Uncomment to enable PostgreSQL:
      # - DATABASE_URL=postgres://sao:sao@db:5432/sao
    volumes:
      - sao-data:/data/sao
    # depends_on:
    #   - db

  # Uncomment for PostgreSQL support:
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: sao
  #     POSTGRES_PASSWORD: sao
  #     POSTGRES_DB: sao
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  sao-data:
  # pg-data:
