services:
  sao:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${SAO_PUBLIC_PORT:-3100}:3100"
    environment:
      SAO_BIND_ADDR: 0.0.0.0:3100
      SAO_DATA_DIR: /data/sao
      SAO_STATIC_DIR: /srv/sao/static
      RUST_LOG: ${RUST_LOG:-info}
      SAO_JWT_SECRET: ${SAO_JWT_SECRET:-}
      SAO_LOCAL_BOOTSTRAP: ${SAO_LOCAL_BOOTSTRAP:-false}
      SAO_LOCAL_ADMIN_USERNAME: ${SAO_LOCAL_ADMIN_USERNAME:-local-admin}
      # Auto-unseal the vault on startup so LLM provider keys stay readable across container
      # restarts. Read at runtime by determine_vault_state(). Use the same value you passed to
      # bootstrap-local (SAO_LOCAL_VAULT_PASSPHRASE) — they are the same passphrase.
      SAO_VAULT_PASSPHRASE: ${SAO_VAULT_PASSPHRASE:-${SAO_LOCAL_VAULT_PASSPHRASE:-}}
      DATABASE_URL: postgres://${POSTGRES_USER:-sao}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment or .env}@db:5432/${POSTGRES_DB:-sao}
      SAO_RP_ID: ${SAO_RP_ID:-localhost}
      SAO_RP_ORIGIN: ${SAO_RP_ORIGIN:-http://localhost:3100}
      SAO_FRONTEND_URL: ${SAO_FRONTEND_URL:-http://localhost:3100}
      SAO_ALLOWED_ORIGINS: ${SAO_ALLOWED_ORIGINS:-http://localhost:3100}
      SAO_COOKIE_SECURE: ${SAO_COOKIE_SECURE:-false}
      SAO_BOOTSTRAP_ADMIN_OID: ${SAO_BOOTSTRAP_ADMIN_OID:-}
      SAO_OIDC_ISSUER_URL: ${SAO_OIDC_ISSUER_URL:-}
      SAO_OIDC_CLIENT_ID: ${SAO_OIDC_CLIENT_ID:-}
      SAO_OIDC_CLIENT_SECRET: ${SAO_OIDC_CLIENT_SECRET:-}
      SAO_OIDC_PROVIDER_NAME: ${SAO_OIDC_PROVIDER_NAME:-Microsoft Entra ID}
      SAO_OIDC_SCOPES: ${SAO_OIDC_SCOPES:-openid profile email}
      # Used by /api/agents/:id/bundle to embed the right SAO URL in the entity config.json.
      SAO_PUBLIC_BASE_URL: ${SAO_PUBLIC_BASE_URL:-http://localhost:3100}
      # Optional legacy path: explicit MSI path inside the container, only used when no
      # installer source is registered under /admin/installer-sources. Newer setups should
      # register a source instead — SAO will download + sha-verify + cache automatically.
      SAO_ORION_INSTALLER_PATH: ${SAO_ORION_INSTALLER_PATH:-/installer/${SAO_ORION_INSTALLER_FILENAME:-OrionII_0.1.1_x64_en-US.msi}}
    volumes:
      # `sao-data` holds: jwt_secret.bin, installer cache (installers/<sha>/<filename>),
      # and any other durable runtime state.
      - sao-data:/data/sao
      # Optional: mount a host directory containing the OrionII MSI when running in the
      # legacy env-var flow. Self-serve installer sources don't need this.
      - ${SAO_ORION_INSTALLER_DIR:-./empty-installer-mount}:/installer:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment or .env}
      POSTGRES_DB: ${POSTGRES_DB:-sao}
    volumes:
      - pg-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sao} -d ${POSTGRES_DB:-sao}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sao-data:
  pg-data:
