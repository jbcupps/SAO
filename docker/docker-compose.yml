version: "3.8"

services:
  sao:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3100:3100"
    environment:
      - SAO_BIND_ADDR=0.0.0.0:3100
      - SAO_DATA_DIR=/data/sao
      - SAO_STATIC_DIR=/srv/sao/static
      - RUST_LOG=info
      - DATABASE_URL=postgres://sao:sao@db:5432/sao
      - SAO_RP_ID=localhost
      - SAO_RP_ORIGIN=http://localhost:3100
    volumes:
      - sao-data:/data/sao
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sao
      POSTGRES_PASSWORD: sao
      POSTGRES_DB: sao
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sao"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sao-data:
  pg-data:
