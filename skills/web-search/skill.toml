[skill]
name = "web-search"
version = "0.1.0"
description = "Fast, low-latency information retrieval for the Id tier"

[skill.tier]
target = "id"           # Runs in the Id (reactive) tier

[skill.constraints]
max_results = 5
pii_allowed = false

[skill.ego]
playbook = "how-to-use.md"

[skill.tool]
crate = "skill-web-search"
entrypoint = "execute"
